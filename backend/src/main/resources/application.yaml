spring:
  application:
    name: flash-sale-engine

  datasource:
    url: jdbc:mysql://localhost:3306/flash_sale_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379

      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 2
          max-wait: 1000ms

ratelimit:
  algorithm: TOKEN_BUCKET
  max-requests: 5
  window-seconds: 60
  burst-capacity: 5
  refill-rate: 1

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNhbXBsZS1kZXZlbG9wbWVudC1zZWNyZXQta2V5LXdoY2gtaXMtbG9uZy1lbm91Z2g=}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: "flash-sale-engine"
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
