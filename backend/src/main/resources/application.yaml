spring:
  application:
    name: flash-sale-engine

  datasource:
    url: jdbc:mysql://localhost:3306/flash_sale_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

ratelimit:
  algorithm: TOKEN_BUCKET
#  max-requests: 4
#  window-seconds: 60
  burst-capacity: 5
  refill-rate: 1