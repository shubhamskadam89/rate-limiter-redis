name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature/**
      - ops/**

  pull_request:
    branches:
      - main

jobs:

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:

      mysql:

        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flash_sale_db

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:

        image: redis:7

        ports:
          - 6379:6379

        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:

      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: flash_sale_db
      DB_USERNAME: root
      DB_PASSWORD: root

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      JWT_SECRET: this-is-a-github-actions-secret-key-for-testing-only

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Maven Wrapper
        run: mvn wrapper:wrapper

      - name: Verify Backend
        run: ./mvnw verify

      - name: Upload Test Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          retention-days: 7

  frontend:
    name: Frontend Build & Lint

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Frontend
        run: npm run build