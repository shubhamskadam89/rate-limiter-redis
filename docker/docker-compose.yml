name: flash-sale-engine

services:

  nginx:
    image: nginx:alpine

    container_name: flash-sale-nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

    depends_on:
      backend:
        condition: service_healthy

      frontend:
        condition: service_started

    networks:
      - flash-sale-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile

    image: flash-sale-frontend:latest
    container_name: flash-sale-frontend

    restart: unless-stopped

    # ports:
    #   - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - flash-sale-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile

    image: flash-sale-backend:latest
    container_name: flash-sale-backend

    restart: unless-stopped

    # ports:
    #   - "8080:8080"

    env_file:
      - ../.env

    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      TZ: Asia/Kolkata

    depends_on:
      mysql:
        condition: service_healthy

      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - flash-sale-network

  mysql:
    image: mysql:8.0
    container_name: flash-sale-mysql

    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Kolkata

    ports:
      - "${DB_PORT}:${DB_PORT}"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale-network

  redis:
    image: redis:7
    container_name: flash-sale-redis

    restart: unless-stopped

    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf

    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale-network

  prometheus:
    image: prom/prometheus:latest
    container_name: flash-sale-prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - flash-sale-network

  grafana:
    image: grafana/grafana:latest
    container_name: flash-sale-grafana

    restart: unless-stopped

    ports:
      - "3010:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: true

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

    depends_on:
      prometheus:
        condition: service_started

    networks:
      - flash-sale-network

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  flash-sale-network:
    driver: bridge
