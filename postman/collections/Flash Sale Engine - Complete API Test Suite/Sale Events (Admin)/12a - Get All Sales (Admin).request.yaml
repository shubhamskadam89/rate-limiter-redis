$kind: http-request
url: "{{baseUrl}}/api/v1/admin/sales"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Admin sales fetched successfully', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.be.an('array');
      });
    language: text/javascript
order: 4000
