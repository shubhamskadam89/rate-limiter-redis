$kind: http-request
url: "{{baseUrl}}/api/v1/admin/sales/{{saleUuid}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Admin sale detail fetched successfully', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.have.property('saleUuid');
      });
    language: text/javascript
order: 5000
