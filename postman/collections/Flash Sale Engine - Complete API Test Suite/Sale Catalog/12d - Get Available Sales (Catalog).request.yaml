$kind: http-request
url: "{{baseUrl}}/api/v1/sales"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Available sales retrieved successfully', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.be.an('array');
      });
    language: text/javascript
order: 1000
