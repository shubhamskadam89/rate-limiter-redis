$kind: http-request
name: 14 - Get Order by UUID
url: "{{baseUrl}}/api/v1/orders/{{orderUuid}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Order details retrieved', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.have.property('orderUuid');
          console.log('Order:', JSON.stringify(j, null, 2));
      });
    language: text/javascript
order: 2000
