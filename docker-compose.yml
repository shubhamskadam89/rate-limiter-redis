# =============================================================================
# Flash Sale Engine — Quick Start
#
# Pulls pre-built images from Docker Hub. No compilation required.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#
# Application:  http://localhost
# Swagger UI:   http://localhost/swagger-ui/index.html
# Grafana:      http://localhost/grafana  (admin / admin)
# Prometheus:   http://localhost:9090
# =============================================================================

name: flash-sale-engine

services:

  nginx:
    image: nginx:alpine
    container_name: flash-sale-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - flash-sale-network

  frontend:
    image: shubhamkadam/flash-sale-frontend:latest
    container_name: flash-sale-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flash-sale-network

  backend:
    image: shubhamkadam/flash-sale-backend:latest
    container_name: flash-sale-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      TZ: Asia/Kolkata
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale-network

  mysql:
    image: mysql:8.0
    container_name: flash-sale-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flash_sale_db}
      TZ: Asia/Kolkata
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${MYSQL_ROOT_PASSWORD:-root}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale-network

  redis:
    image: redis:7
    container_name: flash-sale-redis
    restart: unless-stopped
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: flash-sale-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flash-sale-network

  prometheus:
    image: prom/prometheus:latest
    container_name: flash-sale-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flash-sale-network

  grafana:
    image: grafana/grafana:latest
    container_name: flash-sale-grafana
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - flash-sale-network

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  flash-sale-network:
    driver: bridge
